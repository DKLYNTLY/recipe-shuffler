
#Recipe Shuffler - randomized recipe outputs
[general]
	#When true, generated datapacks randomize recipe outputs.
	randomize_recipes = true
	#Chaos Mode skips all blacklists.
	#Use this if you want every recipe/output included even if it may create progression issues.
	chaos_mode = false
	#Items that should never be shuffled from or into recipe outputs.
	#Use registry IDs, e.g. "minecraft:dragon_egg".
	item_blacklist = ["minecraft:air", "minecraft:barrier", "minecraft:bedrock", "minecraft:command_block", "minecraft:chain_command_block", "minecraft:repeating_command_block", "minecraft:structure_block", "minecraft:structure_void", "minecraft:jigsaw", "minecraft:debug_stick", "minecraft:knowledge_book"]
	#Recipe IDs that should never be randomized.
	#Use registry IDs, e.g. ["minecraft:stick", "mymod:special_machine"].
	recipe_blacklist = []
	#Mod IDs to fully exclude from recipe randomization.
	#Recipes and output items from these namespaces are skipped.
	mod_blacklist = []
	#Show a short command hint when players join.
	show_welcome_message = true

